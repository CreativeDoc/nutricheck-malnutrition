<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5fa8"/>
      <stop offset="100%" stop-color="#2a7fd8"/>
    </linearGradient>
    <radialGradient id="ag" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c6e84e"/>
      <stop offset="35%" stop-color="#8bc34a"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </radialGradient>
    <radialGradient id="hi" cx="30%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind icon -->
  <circle cx="340" cy="300" r="200" fill="url(#glow)"/>

  <!-- White rounded card behind apple -->
  <rect x="260" y="180" width="160" height="160" rx="28" fill="white" opacity="0.15"/>

  <!-- Apple icon (scaled and positioned) -->
  <g transform="translate(340, 260) scale(0.28)">
    <path d="M0 216 C-108 216 -184 120 -184 12 C-184 -60 -156 -108 -112 -128 C-88 -140 -60 -132 -32 -120 C-16 -114 -8 -110 0 -110 C8 -110 16 -114 32 -120 C60 -132 88 -140 112 -128 C156 -108 184 -60 184 12 C184 120 108 216 0 216Z" fill="url(#ag)"/>
    <ellipse cx="-56" cy="-16" rx="80" ry="100" fill="url(#hi)"/>
    <path d="M0 -110 C2 -138 10 -170 4 -208" stroke="#5D4037" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M8 -178 C34 -204 70 -214 96 -206 C90 -188 60 -172 28 -166Z" fill="#66BB6A"/>
  </g>

  <!-- NutriCheck text -->
  <text x="500" y="280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">NutriCheck</text>

  <!-- Divider line -->
  <line x1="500" y1="300" x2="740" y2="300" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="500" y="340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">Ern&#228;hrungs-Screening nach NRS 2002</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(0,0,0,0.15)"/>
</svg>
